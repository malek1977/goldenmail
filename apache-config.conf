# ════════════════════════════════════════════════════════════════
# Apache Virtual Host لـ goldmil.matrxe.com
# ضع المحتوى في: /etc/apache2/sites-available/goldmil.conf
# ثم: sudo a2ensite goldmil && sudo systemctl reload apache2
# ════════════════════════════════════════════════════════════════

# ---------- HTTP → HTTPS ----------
<VirtualHost *:80>
    ServerName goldmil.matrxe.com
    ServerAlias www.goldmil.matrxe.com
    ServerAdmin info@goldenmile.com.sa

    RewriteEngine On
    RewriteRule ^(.*)$ https://%{HTTP_HOST}$1 [R=301,L]
</VirtualHost>

# ---------- HTTPS ----------
<VirtualHost *:443>
    ServerName goldmil.matrxe.com
    ServerAlias www.goldmil.matrxe.com
    ServerAdmin info@goldenmile.com.sa

    # SSL (Let's Encrypt)
    SSLEngine on
    SSLCertificateFile      /etc/letsencrypt/live/goldmil.matrxe.com/fullchain.pem
    SSLCertificateKey       /etc/letsencrypt/live/goldmil.matrxe.com/privkey.pem

    # Security Headers
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-XSS-Protection "1; mode=block"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    # Document root للملفات الثابتة
    DocumentRoot /var/www/html/frontend/public

    # ===== Gzip =====
    <IfModule mod_deflate.c>
        AddOutputFilterByType DEFLATE text/plain
        AddOutputFilterByType DEFLATE text/html
        AddOutputFilterByType DEFLATE text/xml
        AddOutputFilterByType DEFLATE text/css
        AddOutputFilterByType DEFLATE application/javascript
        AddOutputFilterByType DEFLATE application/json
    </IfModule>

    # ===== Backend API (Express على :5000) =====
    ProxyPreserveHost On
    ProxyPass /api http://127.0.0.1:5000/api
    ProxyPassReverse /api http://127.0.0.1:5000/api

    # ===== Next.js (على :3000) =====
    ProxyPass /_next/static http://127.0.0.1:3000/_next/static
    ProxyPassReverse /_next/static http://127.0.0.1:3000/_next/static
    ProxyPass / http://127.0.0.1:3000/
    ProxyPassReverse / http://127.0.0.1:3000/

    ErrorLog ${APACHE_LOG_DIR}/goldmil-error.log
    CustomLog ${APACHE_LOG_DIR}/goldmil-access.log combined
</VirtualHost>

